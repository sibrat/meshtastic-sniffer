syntax = "proto3";
message MeshPacket {
  fixed32 from = 1;
  fixed32 to = 2;
  uint32 channel = 3;
  bytes encrypted = 5;
  fixed32 id = 6;
  fixed32 rx_time = 7;
  float rx_snr = 8;
  uint32 hop_limit = 9;
  bool want_ack = 10;
  uint32 priority = 11;
  int32 rx_rssi = 12;
  bool via_mqtt = 14;
  uint32 hop_start = 15;
  bytes public_key = 16;
  bool pki_encrypted = 17;
  uint32 next_hop = 18;
  uint32 relay_node = 19;
  uint32 tx_after = 20;
  uint32 transport_mechanism = 21;
}
message ServiceEnvelope {
  MeshPacket packet = 1;
  string channel_id = 2;
  string gateway_id = 3;
}
message Position {
  optional sfixed32 latitude_i = 1;
  optional sfixed32 longitude_i = 2;
  optional int32 altitude = 3;
  fixed32 time = 4;
  enum LocSource {
    LOC_UNSET = 0;
    LOC_MANUAL = 1;
    LOC_INTERNAL = 2;
    LOC_EXTERNAL = 3;
  }
  LocSource location_source = 5;
}
message User {
  string id = 1;
  string long_name = 2;
  string short_name = 3;
  bytes macaddr = 4 [deprecated = true];
  HardwareModel hw_model = 5;
  bool is_licensed = 6;
  Role role = 7;
  bytes public_key = 8;
  optional bool is_unmessagable = 9;
}
enum HardwareModel {
  UNSET = 0;
  PRIVATE_HW = 255;
}
enum Role{
  CLIENT = 0;
  CLIENT_HIDDEN = 8;
}
message Data {
  PortNum portnum = 1;
  bytes payload = 2;
  bool want_response = 3;
  fixed32 dest = 4;
  fixed32 source = 5;
  fixed32 request_id = 6;
  fixed32 reply_id = 7;
  fixed32 emoji = 8;
  optional uint32 bitfield = 9;
}
enum PortNum {
  UNKNOWN_APP = 0;
  TEXT_MESSAGE_APP = 1;
  POSITION_APP = 3;
  NODEINFO_APP = 4;
}

